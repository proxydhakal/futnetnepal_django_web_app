{% extends "partials/base.html" %}
{% load static %}
{% block title %}Messages{% endblock %}
{% block body_class %}fn-messenger-page{% endblock %}
{% block main %}
<section class="fn-header-offset fn-messenger-wrap" x-data="FnMessenger({
    currentUserId: {{ request.user.id }},
    activeConversationId: {% if active_conversation %}{{ active_conversation.id }}{% else %}null{% endif %},
    inboxUrl: '{% url 'messages_inbox_data' %}',
    threadUrl: '{% url 'dm_chat_messages' 0 %}'.replace('0', 'CONV_ID'),
    sendUrl: '{% url 'dm_chat_send' 0 %}'.replace('0', 'CONV_ID'),
    confirmAttendanceUrl: '{% url 'event_confirm_attendance' 0 %}'.replace('0', 'CONV_ID'),
    declineAttendanceUrl: '{% url 'event_decline_attendance' 0 %}'.replace('0', 'CONV_ID'),
    confirmMatchUrl: '{% url 'event_confirm_match' 0 %}'.replace('0', 'CONV_ID'),
    cancelConfirmationUrl: '{% url 'event_cancel_confirmation' 0 %}'.replace('0', 'CONV_ID'),
    csrf: '{{ csrf_token }}',
})" x-init="init()">
    {% csrf_token %}
    <div class="fn-messenger-grid max-w-6xl mx-auto" :class="mobileView === 'thread' && 'fn-show-thread'">
        <aside class="fn-messenger-inbox fn-card flex flex-col overflow-hidden">
            <div class="px-4 py-3 border-b border-sky-100 flex items-center justify-between shrink-0">
                <h1 class="font-bold text-sky-950 text-lg">Messages</h1>
                <a href="{% url 'home' %}" class="text-xs font-semibold text-sky-600 hover:underline">Feed</a>
            </div>
            <div class="overflow-y-auto flex-1 min-h-0">
                <p x-show="loadingThreads" class="p-4 text-sm text-sky-600 text-center">Loading...</p>
                <template x-if="!loadingThreads && threads.length === 0">
                    <p class="p-6 text-sm text-sky-600/70 text-center">Mark yourself interested on an event to message the host privately.</p>
                </template>
                <template x-for="t in threads" :key="t.conversation_id">
                    <button type="button" @click="openThread(t.conversation_id)"
                            class="w-full text-left px-4 py-3 border-b border-sky-50 hover:bg-sky-50 transition-colors flex gap-3"
                            :class="activeConversationId === t.conversation_id && 'bg-sky-50'">
                        <img x-show="t.other_avatar" :src="t.other_avatar" class="w-10 h-10 rounded-full object-cover ring-2 ring-sky-100 shrink-0" alt="">
                        <span x-show="!t.other_avatar" class="w-10 h-10 rounded-full bg-sky-600 text-white text-sm font-bold flex items-center justify-center shrink-0"
                              x-text="(t.title || '?')[0]"></span>
                        <div class="min-w-0 flex-1">
                            <p class="font-semibold text-sky-950 text-sm truncate" x-text="t.title"></p>
                            <p class="text-xs text-sky-600/70 mt-0.5 truncate" x-text="t.subtitle"></p>
                            <p class="text-xs text-slate-500 mt-1 truncate" x-text="t.last_message"></p>
                            <div class="flex items-center gap-2 mt-1.5">
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" :class="statusClass(t.event_status)" x-text="statusLabel(t.event_status)"></span>
                            </div>
                        </div>
                    </button>
                </template>
            </div>
        </aside>

        <div class="fn-messenger-thread fn-card flex flex-col overflow-hidden min-w-0">
            <template x-if="!activeThread">
                <div class="flex-1 flex items-center justify-center p-8 text-center">
                    <div>
                        <p class="mb-3 text-sky-400"><i class="fa-solid fa-comments text-4xl" aria-hidden="true"></i></p>
                        <p class="font-bold text-sky-950">Private messages</p>
                        <p class="text-sm text-sky-600/70 mt-2 max-w-xs">Pick a person on the left. Only you and them can see that conversation.</p>
                    </div>
                </div>
            </template>

            <template x-if="activeThread">
                <div class="flex flex-col flex-1 min-h-0 w-full overflow-hidden">
                    <div class="shrink-0 px-4 py-3 border-b border-sky-100 bg-gradient-to-r from-sky-50 to-white">
                        <div class="flex items-start gap-3">
                            <button type="button" @click="backToInbox()" class="md:hidden shrink-0 p-1.5 -ml-1 rounded-full hover:bg-sky-100 text-sky-800" aria-label="Back">
                                <i class="fa-solid fa-arrow-left fn-icon-lg" aria-hidden="true"></i>
                            </button>
                            <img x-show="activeThread.other_avatar" :src="activeThread.other_avatar" class="w-11 h-11 rounded-full object-cover ring-2 ring-sky-100 shrink-0" alt="">
                            <span x-show="!activeThread.other_avatar" class="w-11 h-11 rounded-full bg-sky-600 text-white font-bold flex items-center justify-center shrink-0"
                                  x-text="(activeThread.title || '?')[0]"></span>
                            <div class="min-w-0 flex-1">
                                <p class="font-bold text-sky-950 truncate" x-text="activeThread.title"></p>
                                <p class="text-xs text-sky-600 mt-0.5 truncate" x-text="activeThread.subtitle"></p>
                                <p class="text-xs text-sky-500 mt-0.5" x-text="activeThread.venue + ' · ' + activeThread.date"></p>
                            </div>
                            <span class="shrink-0 text-xs font-bold px-2.5 py-1 rounded-full" :class="statusClass(activeThread.event_status)" x-text="statusLabel(activeThread.event_status)"></span>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3">
                            <template x-if="activeThread.is_host && activeThread.event_status !== 'confirmed'">
                                <button type="button" @click="confirmMatch()" class="inline-flex items-center gap-1.5 text-xs font-bold bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-full">
                                    <i class="fa-solid fa-circle-check fn-icon-sm" aria-hidden="true"></i> Confirm match
                                </button>
                            </template>
                            <template x-if="!activeThread.is_host && activeThread.my_participation === 'interested'">
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" @click="confirmAttendance()" class="text-xs font-bold bg-sky-600 hover:bg-sky-500 text-white px-3 py-1.5 rounded-full">
                                        I'm coming
                                    </button>
                                    <button type="button" @click="declineAttendance()" class="text-xs font-bold bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-full hover:bg-slate-50">
                                        Can't make it
                                    </button>
                                </div>
                            </template>
                            <template x-if="activeThread.my_participation === 'confirmed' && activeThread.event_status !== 'confirmed'">
                                <span class="inline-flex items-center gap-1.5 text-xs font-bold text-emerald-700 bg-emerald-50 px-3 py-1.5 rounded-full">
                                    <i class="fa-solid fa-circle-check fn-icon-sm" aria-hidden="true"></i> You're confirmed
                                </span>
                            </template>
                            <template x-if="activeThread.is_host && activeThread.event_status === 'confirmed'">
                                <button type="button" @click="cancelConfirmation()"
                                        class="text-xs font-bold text-amber-800 bg-amber-50 border border-amber-200 px-3 py-1.5 rounded-full hover:bg-amber-100">
                                    Cancel confirmation
                                </button>
                            </template>
                        </div>
                        <p x-show="activeThread.is_locked" class="text-xs text-emerald-700 bg-emerald-50/80 border border-emerald-100 rounded-lg px-3 py-2 mt-2">
                            Match confirmed — chat is closed. Host can cancel confirmation to reopen planning.
                        </p>
                    </div>

                    <div class="fn-messenger-messages flex-1 min-h-0 overflow-y-auto p-4 space-y-3" x-ref="messageList">
                        <p x-show="loadingMessages" class="text-sm text-center text-sky-600">Loading messages...</p>
                        <template x-for="m in messages" :key="m.id">
                            <div class="flex gap-2" :class="m.is_system ? 'justify-center' : (m.is_mine ? 'justify-end' : 'justify-start')">
                                <img x-show="!m.is_system && !m.is_mine && m.avatar" :src="m.avatar" class="w-8 h-8 rounded-full object-cover ring-2 ring-sky-100 shrink-0 self-end" alt="">
                                <span x-show="!m.is_system && !m.is_mine && !m.avatar"
                                      class="w-8 h-8 rounded-full bg-sky-600 text-white text-xs flex items-center justify-center shrink-0 self-end"
                                      x-text="(m.user || '?')[0]"></span>
                                <div :class="m.is_system
                                    ? 'max-w-[90%] text-center text-xs text-sky-700 bg-sky-50 border border-sky-100 px-4 py-2 rounded-full'
                                    : (m.is_mine
                                        ? 'max-w-[75%] bg-sky-600 text-white rounded-2xl rounded-br-md px-4 py-2 shadow-sm'
                                        : 'max-w-[75%] bg-white border border-sky-100 text-sky-900 rounded-2xl rounded-bl-md px-4 py-2 shadow-sm')">
                                    <p x-show="!m.is_system && !m.is_mine" class="text-[10px] font-bold opacity-80 mb-0.5" x-text="m.user"></p>
                                    <p class="text-sm whitespace-pre-wrap break-words" x-text="m.body"></p>
                                    <p class="text-[10px] mt-1 opacity-70 text-right" x-text="m.created_at"></p>
                                </div>
                            </div>
                        </template>
                    </div>

                    <form @submit.prevent="sendMessage()" class="shrink-0 p-3 border-t border-sky-100 bg-white flex gap-2" x-show="!activeThread.is_locked">
                        <input type="text" x-model="messageText" placeholder="Message privately…" class="fn-input flex-1 !mt-0 rounded-full" maxlength="1000" :disabled="activeThread.event_status === 'cancelled'">
                        <button type="submit" :disabled="sending || !messageText.trim()" class="shrink-0 w-10 h-10 rounded-full bg-sky-600 hover:bg-sky-500 disabled:opacity-50 text-white flex items-center justify-center text-lg font-bold">↑</button>
                    </form>
                    <p x-show="activeThread.is_locked" class="shrink-0 p-3 border-t border-sky-100 text-center text-xs text-sky-600 italic">Messaging closed — match confirmed</p>
                </div>
            </template>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_body %}
<script src="{% static 'js/fn-messenger.js' %}?v=dm4"></script>
{% endblock %}
