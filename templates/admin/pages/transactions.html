{% extends "admin/layout.html" %}
{% block title %}Transactions{% endblock %}
{% block admin_content %}
<div x-data="transactionsPage()" x-init="load()">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white">Transactions</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Venue bookings and match-related activity.</p>
        </div>
        <a href="{% url 'dashboard:model_list' 'core.venuebooking' %}"
           class="inline-flex items-center gap-2 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold px-5 py-2.5 rounded-xl shadow-lg hover:shadow-xl transition">
            <i class="fa-solid fa-database"></i> All bookings
        </a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6" x-show="stats">
        <template x-for="card in (stats?.cards || []).filter(c => c.label === 'Pending bookings' || c.label === 'Posts')" :key="card.label">
            <div class="admin-glass rounded-2xl p-5 hover:-translate-y-0.5 transition-transform">
                <p class="text-xs font-bold uppercase text-slate-500" x-text="card.label"></p>
                <p class="text-2xl font-extrabold mt-1 text-slate-900 dark:text-white" x-text="card.value"></p>
                <p class="text-xs text-slate-500 mt-1" x-text="card.sub"></p>
            </div>
        </template>
    </div>

    <div class="admin-glass rounded-2xl p-4 mb-4 flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-[180px]">
            <label class="text-xs font-bold text-slate-500 uppercase">Search</label>
            <input type="search" x-model="q" @input.debounce.400ms="load(1)"
                   class="w-full mt-1 px-4 py-2.5 rounded-xl bg-slate-100/80 dark:bg-slate-800/60 text-sm outline-none focus:ring-2 focus:ring-amber-500/30">
        </div>
        <div>
            <label class="text-xs font-bold text-slate-500 uppercase">Status</label>
            <select x-model="status" @change="load(1)" class="mt-1 px-4 py-2.5 rounded-xl bg-slate-100/80 dark:bg-slate-800/60 text-sm">
                <option value="">All</option>
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>
    </div>

    <div class="admin-glass rounded-2xl overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-50/80 dark:bg-slate-800/40 text-xs uppercase text-slate-500">
                <tr>
                    <th class="px-5 py-3 text-left font-bold">ID</th>
                    <template x-for="col in columns" :key="col">
                        <th class="px-5 py-3 text-left font-bold" x-text="col"></th>
                    </template>
                </tr>
            </thead>
            <tbody>
                <template x-for="row in rows" :key="row.id">
                    <tr class="admin-table-row border-t border-slate-100 dark:border-slate-800/80">
                        <td class="px-5 py-3 font-mono text-slate-500" x-text="row.id"></td>
                        <template x-for="col in columns" :key="col">
                            <td class="px-5 py-3 max-w-xs truncate" x-text="row[col]"></td>
                        </template>
                    </tr>
                </template>
            </tbody>
        </table>
        <div class="px-5 py-3 flex justify-between text-sm text-slate-500 border-t border-slate-200/50">
            <span x-text="total + ' records'"></span>
            <div class="flex gap-2">
                <button @click="load(page-1)" :disabled="!has_previous" class="px-3 py-1 rounded-lg border disabled:opacity-40">Prev</button>
                <button @click="load(page+1)" :disabled="!has_next" class="px-3 py-1 rounded-lg border disabled:opacity-40">Next</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function transactionsPage() {
    return {
        rows: [], columns: [], stats: null, q: '', status: '', page: 1, total: 0, has_next: false, has_previous: false,
        async load(page) {
            this.page = page || 1;
            if (!this.stats) this.stats = await fetch('{% url "dashboard:api_stats" %}').then(r => r.json());
            const p = new URLSearchParams({ page: this.page, q: this.q });
            if (this.status) p.set('filter_status', this.status);
            const d = await fetch('/iamadmin/api/core.venuebooking/list/?' + p).then(r => r.json());
            this.rows = d.rows; this.columns = d.columns; this.total = d.total;
            this.has_next = d.has_next; this.has_previous = d.has_previous;
        },
    };
}
</script>
{% endblock %}
