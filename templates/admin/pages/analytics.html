{% extends "admin/layout.html" %}
{% block title %}Analytics{% endblock %}
{% block admin_content %}
<div x-data="analyticsPage()" x-init="load()">
    <div class="mb-8">
        <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900">Analytics</h1>
        <p class="text-slate-500 mt-1">Deep dive into users, posts, bookings, and engagement.</p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" x-show="data">
        <template x-for="(val, key) in data?.engagement || {}" :key="key">
            <div class="admin-glass rounded-2xl p-4 text-center hover:scale-[1.02] transition-transform">
                <p class="text-2xl font-extrabold text-sky-600" x-text="val"></p>
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500 mt-1" x-text="key.replace('_',' ')"></p>
            </div>
        </template>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-4">
        <div class="admin-glass rounded-2xl p-6">
            <h2 class="font-bold mb-4 text-slate-900">User signups</h2>
            <div class="admin-chart-wrap"><canvas id="aUsers"></canvas></div>
        </div>
        <div class="admin-glass rounded-2xl p-6">
            <h2 class="font-bold mb-4 text-slate-900">Posts trend</h2>
            <div class="admin-chart-wrap"><canvas id="aPosts"></canvas></div>
        </div>
        <div class="admin-glass rounded-2xl p-6">
            <h2 class="font-bold mb-4 text-slate-900">Bookings</h2>
            <div class="admin-chart-wrap"><canvas id="aBookings"></canvas></div>
        </div>
        <div class="admin-glass rounded-2xl p-6">
            <h2 class="font-bold mb-4 text-slate-900">Booking status</h2>
            <div class="admin-chart-wrap"><canvas id="aBookStatus"></canvas></div>
        </div>
    </div>
</div>
{% endblock %}
{% block admin_extra_js %}
<script>
function analyticsPage() {
    return {
        data: null,
        charts: {},
        async load() {
            this.data = await fetch('{% url "dashboard:api_analytics" %}').then(r => r.json());
            this.$nextTick(() => {
                const c = this.data.charts;
                this.chart('aUsers', 'line', c.users_daily, '#38bdf8');
                this.chart('aPosts', 'bar', c.posts_monthly, '#8b5cf6');
                this.chart('aBookings', 'line', c.bookings_daily, '#f59e0b');
                this.chart('aBookStatus', 'doughnut', c.bookings_status);
            });
        },
        chart(id, type, data, color) {
            const el = document.getElementById(id);
            if (!el || !data) return;
            const cfg = {
                type: type === 'doughnut' ? 'doughnut' : type,
                data: {
                    labels: data.labels || [],
                    datasets: [{
                        data: data.values || [],
                        backgroundColor: type === 'doughnut' ? ['#38bdf8','#10b981','#f59e0b','#ef4444'] : color + '44',
                        borderColor: type === 'doughnut' ? undefined : color,
                        borderWidth: 2,
                        fill: type === 'line',
                        tension: 0.35,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: type === 'doughnut' } },
                },
            };
            if (this.charts[id]) this.charts[id].destroy();
            this.charts[id] = new Chart(el, cfg);
        },
    };
}
</script>
{% endblock %}
