{% extends "admin/base.html" %}
{% block title %}Request access{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full admin-glass-strong rounded-3xl p-8 text-center">
        <h1 class="text-xl font-extrabold text-slate-900">Admin access</h1>
        <p class="text-slate-500 text-sm mt-3 leading-relaxed">
            Staff accounts use role <strong>Super Admin</strong>. Create one via
            <code class="text-xs bg-slate-100 px-1.5 py-0.5 rounded">createsuperuser</code>
            or from <strong>Users &amp; access → User accounts</strong> after signing in.
        </p>
        <a href="{% url 'dashboard:login' %}" class="inline-block mt-6 text-sky-600 font-bold hover:underline">← Back to sign in</a>
    </div>
</div>
{% endblock %}
