{% extends "admin/base.html" %}
{% block title %}Sign in{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-sky-400/20 via-violet-500/10 to-slate-900/5 dark:from-sky-900/40 dark:via-violet-900/30 dark:to-slate-950"></div>
    <div class="absolute top-20 left-10 w-72 h-72 bg-sky-400/30 rounded-full blur-3xl"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-violet-500/20 rounded-full blur-3xl"></div>

    <div class="relative w-full max-w-md admin-glass-strong rounded-3xl p-8 md:p-10 shadow-2xl animate-slide-up">
        <div class="text-center mb-8">
            {% load static %}
            <img src="{% static 'images/logo.png' %}" alt="" class="h-14 mx-auto mb-4">
            <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white">Futnet Admin</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Sign in to your staff account</p>
        </div>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="rounded-xl bg-red-500/10 border border-red-500/20 text-red-600 dark:text-red-300 text-sm px-4 py-3">
                {{ form.non_field_errors }}
            </div>
            {% endif %}
            <div>
                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Username</label>
                <input name="username" required autofocus value="{{ form.username.value|default:'' }}"
                       class="w-full mt-1.5 px-4 py-3 rounded-xl bg-slate-100/80 dark:bg-slate-800/80 border border-slate-200/50 dark:border-slate-700/50 outline-none focus:ring-2 focus:ring-sky-500/40 transition">
            </div>
            <div>
                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
                <input type="password" name="password" required
                       class="w-full mt-1.5 px-4 py-3 rounded-xl bg-slate-100/80 dark:bg-slate-800/80 border border-slate-200/50 dark:border-slate-700/50 outline-none focus:ring-2 focus:ring-sky-500/40 transition">
            </div>
            <button type="submit"
                    class="w-full py-3.5 rounded-xl bg-gradient-to-r from-sky-500 to-violet-600 text-white font-bold shadow-lg shadow-sky-500/30 hover:shadow-xl hover:scale-[1.01] active:scale-[0.99] transition-all">
                Sign in
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500">
            <a href="{% url 'dashboard:register' %}" class="text-sky-600 font-semibold hover:underline">Request access</a>
        </p>
    </div>
</div>
{% endblock %}
