{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} · Futnet Nepal</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin-theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/fontawesome.min.css' %}?v=fa2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="admin-body text-slate-800 antialiased h-full {% block body_class %}{% endblock %}">
{% block body %}{% endblock %}
{% include "admin/partials/toast.html" %}
<script>
function adminToast() {
    return {
        items: [],
        push(message, type = 'success') {
            const id = Date.now();
            this.items.push({ id, message, type });
            setTimeout(() => { this.items = this.items.filter(i => i.id !== id); }, 4000);
        },
    };
}
function animateCounter(target, duration = 900) {
    const end = parseInt(target, 10) || 0;
    return {
        current: 0,
        init() {
            const start = performance.now();
            const tick = (now) => {
                const p = Math.min((now - start) / duration, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                this.current = Math.floor(end * ease);
                if (p < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
        },
    };
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
