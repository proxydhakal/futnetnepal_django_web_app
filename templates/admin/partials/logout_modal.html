<div x-data="{ logoutOpen: false }"
     @admin-logout.window="logoutOpen = true"
     @keydown.escape.window="logoutOpen = false">
    <div x-show="logoutOpen" x-cloak
         class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm"
         x-transition.opacity>
        <div class="admin-glass-strong rounded-2xl shadow-2xl w-full max-w-md p-6 sm:p-8 animate-slide-up"
             @click.outside="logoutOpen = false"
             x-transition>
            <div class="w-12 h-12 rounded-2xl bg-red-500/15 text-red-600 flex items-center justify-center text-xl mb-4">
                <i class="fa-solid fa-right-from-bracket"></i>
            </div>
            <h2 class="text-xl font-extrabold text-slate-900 dark:text-white">Sign out?</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2 leading-relaxed">
                You’ll need to sign in again to access the Futnet admin panel.
            </p>
            <div class="flex flex-col-reverse sm:flex-row gap-3 mt-6">
                <button type="button" @click="logoutOpen = false"
                        class="flex-1 px-5 py-3 rounded-xl border border-slate-200 dark:border-slate-600 font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
                    Cancel
                </button>
                <form method="post" action="{% url 'dashboard:logout' %}" class="flex-1">
                    {% csrf_token %}
                    <button type="submit"
                            class="w-full px-5 py-3 rounded-xl bg-gradient-to-r from-red-500 to-rose-600 text-white font-bold shadow-lg shadow-red-500/25 hover:shadow-xl transition">
                        Sign out
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
