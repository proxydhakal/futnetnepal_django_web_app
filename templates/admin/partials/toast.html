<div x-data="adminToast()" x-on:admin-toast.window="push($event.detail.message, $event.detail.type || 'success')"
     class="fixed top-4 right-4 z-[200] flex flex-col gap-2 max-w-sm pointer-events-none">
    <template x-for="t in items" :key="t.id">
        <div x-show="true" x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0"
             class="pointer-events-auto admin-glass-strong rounded-xl px-4 py-3 text-sm font-medium shadow-lg flex items-center gap-3"
             :class="t.type === 'error' ? 'border-l-4 border-l-red-500 text-red-700' : 'border-l-4 border-l-emerald-500 text-emerald-800'">
            <i class="fa-solid" :class="t.type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check'"></i>
            <span x-text="t.message"></span>
        </div>
    </template>
</div>
