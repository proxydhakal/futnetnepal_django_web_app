{% load static %}
<div class="admin-sidebar h-full flex flex-col text-sm w-full" :class="sidebarCollapsed ? 'items-center' : ''">
    <div class="admin-shell-header border-b border-slate-200/60 dark:border-slate-700/50 flex items-center gap-3 px-4 shrink-0"
         :class="sidebarCollapsed ? 'justify-center px-2' : ''">
        <a href="{% url 'dashboard:home' %}" class="flex items-center gap-3 min-w-0">
            <img src="{% static 'images/logo.png' %}" alt="" class="h-9 w-9 shrink-0">
            <div x-show="!sidebarCollapsed" x-cloak>
                <p class="font-bold text-slate-900 dark:text-white text-sm leading-tight">Futnet Admin</p>
                <p class="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest">Control center</p>
            </div>
        </a>
    </div>

    <nav class="flex-1 overflow-y-auto p-3 space-y-1 admin-sidebar-scroll">
        <p x-show="!sidebarCollapsed" class="px-3 pt-2 pb-1 text-[10px] font-bold uppercase tracking-wider text-slate-400">Main</p>
        <a href="{% url 'dashboard:home' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium transition-all {% if active_page == 'dashboard' %}admin-nav-active{% else %}text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800/80{% endif %}"
           :class="sidebarCollapsed ? 'justify-center' : ''" title="Overview">
            <i class="fa-solid fa-house w-5 text-center text-sky-500"></i>
            <span x-show="!sidebarCollapsed">Overview</span>
        </a>
        <a href="{% url 'dashboard:analytics' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium transition-all {% if active_page == 'analytics' %}admin-nav-active{% else %}text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800/80{% endif %}"
           :class="sidebarCollapsed ? 'justify-center' : ''" title="Analytics">
            <i class="fa-solid fa-chart-pie w-5 text-center text-violet-500"></i>
            <span x-show="!sidebarCollapsed">Analytics</span>
        </a>
        <a href="{% url 'dashboard:users' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium transition-all {% if active_page == 'users' %}admin-nav-active{% else %}text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800/80{% endif %}"
           :class="sidebarCollapsed ? 'justify-center' : ''" title="Users">
            <i class="fa-solid fa-user-group w-5 text-center text-emerald-500"></i>
            <span x-show="!sidebarCollapsed">Users</span>
        </a>
        <a href="{% url 'dashboard:transactions' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium transition-all {% if active_page == 'transactions' %}admin-nav-active{% else %}text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800/80{% endif %}"
           :class="sidebarCollapsed ? 'justify-center' : ''" title="Transactions">
            <i class="fa-solid fa-receipt w-5 text-center text-amber-500"></i>
            <span x-show="!sidebarCollapsed">Transactions</span>
        </a>
        <a href="{% url 'dashboard:settings' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-medium transition-all {% if active_page == 'settings' %}admin-nav-active{% else %}text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800/80{% endif %}"
           :class="sidebarCollapsed ? 'justify-center' : ''" title="Settings">
            <i class="fa-solid fa-gear w-5 text-center text-slate-500"></i>
            <span x-show="!sidebarCollapsed">Settings</span>
        </a>

        <p x-show="!sidebarCollapsed" class="px-3 pt-5 pb-1 text-[10px] font-bold uppercase tracking-wider text-slate-400">Manage data</p>

        {% for section in sidebar_sections %}
        <div x-show="!sidebarCollapsed"
             x-data="{ open: {{ section.contains_active|yesno:'true,false' }} }"
             class="rounded-xl {% if section.contains_active %}bg-slate-100/60 dark:bg-slate-800/40{% endif %}">
            <button type="button" @click="open = !open"
                    class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-left font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100/80 dark:hover:bg-slate-800/60 transition">
                <i class="fa-solid {{ section.icon }} w-4 text-center text-sky-500 text-xs"></i>
                <span class="flex-1 text-xs">{{ section.label }}</span>
                <span class="text-[10px] font-bold text-slate-400 tabular-nums">{{ section.models|length }}</span>
                <i class="fa-solid fa-chevron-down text-[8px] text-slate-400 transition-transform duration-200"
                   :class="open && 'rotate-180'"></i>
            </button>
            <ul x-show="open"
                x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 -translate-y-1"
                x-transition:enter-end="opacity-100 translate-y-0"
                class="space-y-0.5 pb-2 pl-2 ml-3 border-l border-slate-200/80 dark:border-slate-700/60">
                {% for meta in section.models %}
                <li>
                    <a href="{% url 'dashboard:model_list' meta.key %}"
                       class="block px-3 py-1.5 rounded-lg truncate text-[13px] transition {% if active_model == meta.key or sidebar_active_model == meta.key %}admin-nav-active font-semibold{% else %}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/80{% endif %}">
                        {{ meta.verbose_name_plural|capfirst }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
        {% endfor %}
    </nav>

    <div class="p-3 border-t border-slate-200/60 dark:border-slate-700/50">
        <button type="button" @click="sidebarCollapsed = !sidebarCollapsed"
                class="hidden lg:flex w-full items-center justify-center gap-2 px-3 py-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 text-xs font-semibold">
            <i class="fa-solid" :class="sidebarCollapsed ? 'fa-angles-right' : 'fa-angles-left'"></i>
            <span x-show="!sidebarCollapsed">Collapse</span>
        </button>
    </div>
</div>
