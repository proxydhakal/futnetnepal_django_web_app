{% extends "partials/base.html" %}
{% block title %}Settings{% endblock %}
{% block main %}
<section class="fn-header-offset pb-12 bg-slate-100 min-h-screen">
    <div class="container mx-auto px-4 max-w-lg">
        <a href="{% url 'accounts:profile' %}" class="text-sm text-sky-600 font-semibold hover:underline">← Back to profile</a>
        <div class="mt-4 bg-white rounded-2xl shadow-sm p-8">
            <h1 class="text-xl font-extrabold text-sky-950">Account settings</h1>
            <p class="text-sm text-slate-500 mt-1">Change your password</p>
            <form method="post" class="mt-6 space-y-4">
                {% csrf_token %}
                {% include "partials/form_errors.html" %}
                {% for field in form %}
                <div>
                    <label class="text-sm font-semibold text-slate-700">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-xl">Update password</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
