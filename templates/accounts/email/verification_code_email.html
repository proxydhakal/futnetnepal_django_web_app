<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification code — {{ site_name }}</title>
</head>
<body style="margin:0;padding:0;background-color:#e0f2fe;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:linear-gradient(180deg,#f0f9ff 0%,#e0f2fe 55%,#f0f9ff 100%);padding:32px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 40px rgba(2,132,199,0.15);">
                <tr>
                    <td style="background:linear-gradient(135deg,#0284c7 0%,#0c4a6e 100%);padding:28px 24px;text-align:center;">
                        <img src="{{ logo_url }}" alt="{{ site_name }}" width="160" style="display:block;margin:0 auto 12px;height:auto;max-width:160px;border:0;">
                        <p style="margin:0;font-size:13px;font-weight:600;color:#bae6fd;letter-spacing:0.04em;text-transform:uppercase;">Email verification</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px 28px;text-align:center;">
                        <h1 style="margin:0 0 12px;font-size:22px;line-height:1.3;font-weight:800;color:#0c4a6e;">Hi {{ display_name }},</h1>
                        <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#475569;">
                            Enter this code in the Futnet Nepal app to verify your email:
                        </p>
                        <p style="margin:0 0 8px;font-size:36px;font-weight:800;letter-spacing:0.25em;color:#0284c7;">{{ verification_code }}</p>
                        <p style="margin:0 0 24px;font-size:13px;color:#64748b;">Expires in {{ expiry_minutes }} minutes.</p>
                        <hr style="border:none;border-top:1px solid #e2e8f0;margin:24px 0;">
                        <p style="margin:0;font-size:12px;line-height:1.5;color:#94a3b8;">
                            If you did not create an account, you can safely ignore this email.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="background:#f8fafc;padding:16px 24px;text-align:center;border-top:1px solid #e2e8f0;">
                        <p style="margin:0;font-size:12px;color:#64748b;">
                            © {{ site_name }} · <a href="{{ site_url }}" style="color:#e11d48;font-weight:600;text-decoration:none;">{{ site_url }}</a>
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
