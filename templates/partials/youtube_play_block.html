{# Poster image + play button; opens modal iframe when youtube_embed is set. #}
{% load static %}
{% if youtube_embed %}
<div x-data="youtubeModal('{{ youtube_embed|escapejs }}')" class="w-full">
    <button type="button" @click="openModal()"
            class="block fn-media-brand w-full relative group text-left cursor-pointer rounded-2xl focus:outline-none focus-visible:ring-4 focus-visible:ring-sky-300"
            aria-label="Play video">
        <img src="{% if poster_static %}{% static poster_static %}{% elif poster_src %}{{ poster_src }}{% else %}{% static 'images/logo.png' %}{% endif %}" alt="{{ poster_alt }}" class="fn-media-natural rounded-2xl shadow-2xl ring-1 ring-slate-200 opacity-95 group-hover:opacity-100 transition-opacity duration-300">
        <span class="absolute inset-0 flex items-center justify-center pointer-events-none" aria-hidden="true">
            <span class="w-16 h-16 sm:w-20 sm:h-20 bg-white/20 backdrop-blur-md border-2 border-white rounded-full flex items-center justify-center group-hover:scale-110 transition-transform shadow-lg">
                <svg class="w-7 h-7 sm:w-8 sm:h-8 text-white ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            </span>
        </span>
    </button>

    <div x-show="open" x-cloak
         @click.self="closeModal()"
         @keydown.escape.window="open && closeModal()"
         class="fixed inset-0 z-[70] flex items-center justify-center bg-sky-950/70 backdrop-blur-sm p-4"
         role="dialog" aria-modal="true" aria-label="Video player">
        <div class="relative w-full max-w-4xl" @click.stop>
            <button type="button" @click="closeModal()"
                    class="absolute -top-10 right-0 text-white/90 hover:text-white text-3xl leading-none"
                    aria-label="Close video">&times;</button>
            <div class="aspect-video w-full rounded-2xl overflow-hidden bg-black shadow-2xl ring-1 ring-white/10">
                <iframe x-show="open" class="w-full h-full" :src="embedSrc"
                        title="YouTube video player"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>
            </div>
        </div>
    </div>
</div>
{% else %}
<div class="fn-media-brand w-full">
    <img src="{% if poster_static %}{% static poster_static %}{% elif poster_src %}{{ poster_src }}{% else %}{% static 'images/logo.png' %}{% endif %}" alt="{{ poster_alt }}" class="fn-media-natural rounded-2xl shadow-2xl ring-1 ring-slate-200">
</div>
{% endif %}
