<div id="editModal" x-show="showEdit" x-cloak
     x-effect="showEdit && $nextTick(() => document.dispatchEvent(new CustomEvent('fn-select2-init', { detail: { scope: '#editForm', parent: '#editModalPanel' } })))"
     @click.self="closeEdit()" @keydown.escape.window="showEdit && closeEdit()" class="fixed inset-0 z-[60] flex items-start justify-center bg-sky-950/40 backdrop-blur-sm p-4 fn-header-offset overflow-y-auto">
    <div id="editModalPanel" class="fn-card w-full max-w-lg overflow-visible shadow-2xl shadow-sky-900/20" @click.stop>
        <div class="fn-modal-header flex items-center justify-between px-6 py-4">
            <h2 class="text-lg font-bold">Edit Event</h2>
            <button type="button" @click="closeEdit()" class="text-white/80 hover:text-white text-xl">&times;</button>
        </div>
        <form id="editForm" @submit.prevent="submitEdit" class="p-6 space-y-4 bg-white" novalidate>
            {% csrf_token %}
            <div class="grid gap-4 sm:grid-cols-2">
                <div class="fn-field">
                    <label class="fn-label" for="edit_location">Location</label>
                    <select name="location" id="edit_location" class="fn-input fn-select2">
                        {% for loc in locations %}<option value="{{ loc.id }}">{{ loc.name }}</option>{% endfor %}
                    </select>
                    <p class="fn-field-error hidden" data-field-error="location" role="alert"></p>
                </div>
                <div class="fn-field">
                    <label class="fn-label" for="edit_venue">Venue</label>
                    <select name="venue" id="edit_venue" class="fn-input fn-select2">
                        {% for v in venues %}<option value="{{ v.id }}">{{ v.name }}</option>{% endfor %}
                    </select>
                    <p class="fn-field-error hidden" data-field-error="venue" role="alert"></p>
                </div>
                <div class="fn-field">
                    <label class="fn-label" for="edit_date">Date</label>
                    <input type="date" name="date" id="edit_date" class="fn-input">
                    <p class="fn-field-error hidden" data-field-error="date" role="alert"></p>
                </div>
                <div class="fn-field">
                    <label class="fn-label" for="edit_time">Time</label>
                    <select name="time" id="edit_time" class="fn-input fn-select2">
                        {% for t in timess %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}
                    </select>
                    <p class="fn-field-error hidden" data-field-error="time" role="alert"></p>
                </div>
            </div>
            <div class="fn-field">
                <label class="fn-label" for="edit_message">Message</label>
                <textarea name="message" id="edit_message" rows="3" class="fn-input"></textarea>
                <p class="fn-field-error hidden" data-field-error="message" role="alert"></p>
            </div>
            <button type="submit" :disabled="saving" class="w-full bg-sky-600 hover:bg-sky-500 disabled:opacity-60 text-white font-bold py-3 rounded-xl shadow-md shadow-sky-600/20">
                <span x-text="saving ? 'Saving...' : 'Save changes'"></span>
            </button>
        </form>
    </div>
</div>
