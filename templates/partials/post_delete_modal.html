<div id="deletePostModal" x-show="showDelete" x-cloak
     @click.self="closeDelete()" @keydown.escape.window="showDelete && closeDelete()"
     class="fixed inset-0 z-[60] flex items-center justify-center bg-sky-950/40 backdrop-blur-sm p-4 fn-header-offset">
    <div class="fn-card w-full max-w-md shadow-2xl shadow-sky-900/20" @click.stop>
        <div class="fn-modal-header flex items-center justify-between px-6 py-4 rounded-t-2xl">
            <h2 class="text-lg font-bold">Delete match?</h2>
            <button type="button" @click="closeDelete()" class="text-white/80 hover:text-white text-xl" aria-label="Close">&times;</button>
        </div>
        <div class="p-6 bg-white rounded-b-2xl">
            <p class="text-slate-600 text-sm leading-relaxed">
                This will permanently remove your match post, including all interest, likes, comments, and messages. This cannot be undone.
            </p>
            <p class="mt-3 text-sm font-semibold text-sky-950 line-clamp-2" x-show="deletingPreview" x-text="deletingPreview"></p>
            <div class="mt-6 flex flex-wrap gap-3">
                <button type="button" @click="closeDelete()" :disabled="deleting"
                        class="flex-1 min-w-[7rem] bg-slate-200 hover:bg-slate-300 disabled:opacity-60 text-slate-800 font-bold py-2.5 px-4 rounded-xl text-sm">
                    Cancel
                </button>
                <button type="button" @click="confirmDelete()" :disabled="deleting"
                        class="flex-1 min-w-[7rem] bg-rose-600 hover:bg-rose-500 disabled:opacity-60 text-white font-bold py-2.5 px-4 rounded-xl text-sm shadow-md shadow-rose-600/25">
                    <span x-text="deleting ? 'Deleting...' : 'Delete match'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
