{# Per-field label, input, and inline errors (red). Usage: {% include "partials/form_field.html" with field=form.email %} #}
<div class="fn-field{% if field.errors %} fn-field--error{% endif %}{% if field_class %} {{ field_class }}{% endif %}">
    <label class="fn-label" for="{{ field.id_for_label }}">
        {{ field.label }}
        {% if field.field.required %}<span class="text-red-500" aria-hidden="true"> *</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text and not hide_help %}
    <p class="fn-field-help">{{ field.help_text }}</p>
    {% endif %}
    {% for error in field.errors %}
    <p class="fn-field-error" role="alert">{{ error }}</p>
    {% endfor %}
</div>
