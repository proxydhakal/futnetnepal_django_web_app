{# Single approved review card. Expects review (UserReview). Optional compact=1 for carousel. #}
<div class="flex-1 text-center{% if compact %} px-2{% endif %}">
    <div class="w-20 h-20 bg-sky-100 rounded-full mx-auto mb-4 flex items-center justify-center overflow-hidden border-4 border-white shadow-md">
        <span class="text-2xl font-bold text-sky-700">{{ review.name|slice:":1"|upper }}</span>
    </div>
    <div class="flex justify-center mb-3">
        {% include "partials/review_stars.html" with rating=review.rating %}
    </div>
    <p class="text-slate-600 italic leading-relaxed mb-4">"{{ review.message }}"</p>
    <p class="text-sky-600 font-medium text-sm">{{ review.name }}</p>
</div>
