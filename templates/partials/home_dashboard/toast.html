<div x-show="toast" x-cloak
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-4"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed top-24 right-4 z-[100] max-w-sm rounded-xl px-4 py-3.5 text-sm font-medium shadow-lg border flex items-start gap-3 glass"
     :class="{
        'border-red-200 text-red-800': toast?.type === 'error',
        'border-amber-200 text-amber-900': toast?.type === 'warning',
        'border-brand-200 text-brand-900': toast?.type === 'info',
        'border-pitch-200 text-brand-900': !toast?.type || toast?.type === 'success'
     }">
    <i class="fa-solid mt-0.5 shrink-0"
       :class="{
         'fa-circle-xmark text-red-500': toast?.type === 'error',
         'fa-triangle-exclamation text-amber-500': toast?.type === 'warning',
         'fa-circle-info text-brand-500': toast?.type === 'info',
         'fa-circle-check text-pitch-500': !toast?.type || toast?.type === 'success'
       }"></i>
    <span class="leading-snug" x-text="toast?.text"></span>
</div>
