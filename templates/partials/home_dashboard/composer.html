<div class="glass rounded-2xl p-4 shadow-sm animate-fade-up">
  <div class="flex items-center gap-3 mb-3">
    {% if userprofiledata and userprofiledata.profile_image %}
    <img src="{{ userprofiledata.profile_image.url }}" alt="" class="w-10 h-10 rounded-xl object-cover flex-shrink-0 shadow-md shadow-brand-500/20 ring-2 ring-white">
    {% else %}
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-700 flex items-center justify-center flex-shrink-0 shadow-md shadow-brand-500/20">
      <span class="text-white text-sm font-display font-bold">{{ request.user.username|slice:":2"|upper }}</span>
    </div>
    {% endif %}
    <button type="button" @click="$dispatch('open-create')"
            class="flex-1 text-left px-4 py-2.5 rounded-xl bg-brand-50/70 border border-brand-100 text-brand-400 text-sm hover:bg-white hover:border-brand-200 transition-all focus:outline-none">
      What's on your mind, {% if request.user.first_name %}{{ request.user.first_name }}{% else %}{{ request.user.username }}{% endif %}?
    </button>
  </div>
  <div class="flex items-center gap-2 flex-wrap">
    <button type="button" @click="$dispatch('open-create')"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium text-brand-600 hover:bg-brand-50 transition-all border border-brand-100">
      <svg class="w-4 h-4 text-pitch-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      Photo
    </button>
    <button type="button" @click="$dispatch('open-create')"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium text-brand-600 hover:bg-brand-50 transition-all border border-brand-100">
      <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Venue
    </button>
    <div class="flex-1 min-w-[4rem]"></div>
    <button type="button" @click="$dispatch('open-create')"
            class="flex items-center gap-2 px-5 py-2 rounded-xl btn-primary text-white text-sm font-semibold font-display">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
      Host a Match
    </button>
  </div>
</div>
