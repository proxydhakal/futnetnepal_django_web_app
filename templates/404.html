{% extends "partials/base.html" %}
{% block title %}Page not found{% endblock %}
{% block main %}
<section class="fn-header-offset min-h-screen flex items-center justify-center px-4">
    <div class="fn-card p-10 md:p-14 text-center max-w-lg">
        <p class="text-6xl font-black text-sky-600">404</p>
        <h1 class="mt-4 text-2xl font-extrabold text-sky-950">Page not found</h1>
        <p class="mt-2 text-slate-600">The page you are looking for does not exist or was moved.</p>
        <a href="{% url 'index' %}" class="inline-block mt-8 bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 px-8 rounded-full">Go home</a>
    </div>
</section>
{% endblock %}
