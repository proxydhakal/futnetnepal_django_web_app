version: '3.3'
services:
  nginx:
    image: nginx:1.15-alpine
    restart: always
    logging:
      driver: gcplogs
    volumes:
      - ./docker/data/nginx:/etc/nginx/conf.d/
      - backend_media:/code/media/
      - ./static:/code/static/
      - ./docker/data/certbot/conf:/etc/letsencrypt
      - ./docker/data/certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - ./docker/data/certbot/conf:/etc/letsencrypt
      - ./docker/data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  backend:
    container_name: backend
    restart: always
    logging:
      driver: gcplogs
    build:
      context: ./
    ports:
      - "8000:8000"
    volumes:
      - ./:/code
      - backend_media:/code/media/
    env_file:
      - './.env'
    environment:
      DEBUG: 'false'
      REDIS_URL: redis://:mypassword@redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: redis_cache
    restart: always
    command: redis-server --requirepass mypassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis_ui
    restart: always
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data

  futnet_db:
    image: postgres
    container_name:  futnet_db
    environment:
      - POSTGRES_USER=proxydhakal
      - POSTGRES_PASSWORD=proxydhakal@123
      - POSTGRES_DB=futnetnepal
      - POSTGRES_PORT=5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always

volumes:
  backend_static:
  backend_media:
  redis_data:
  redisinsight_data:
